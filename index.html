<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entomology Tools</title>

<style>
:root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #333;
    --accent: #2c7be5;
}

body.dark {
    --bg: #1e1e1e;
    --card: #2a2a2a;
    --text: #f1f1f1;
}

/* correction lisibilité des pastilles en dark mode */
body.dark .badge,
body.dark .tag,
body.dark .pill,
body.dark .lang-badge{
    color: #000;
}

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 70px;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(135deg, #2c3e50, #2c7be5);
    color: white;
}

header button{
    padding: 7px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 0.85em;
    background: rgba(255,255,255,0.15);
    color: white;
    transition: 0.2s ease;
}

header button:hover{
    background: rgba(255,255,255,0.25);
}

.badge{
    color: #111;
}


.logo {
    font-weight: bold;
}

.search-wrapper {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    max-width: 500px;
    margin: 0 10px;
}

.search-wrapper input {
    flex: 1;
    padding: 8px;
    border-radius: 6px 0 0 6px;
    border: none;
}

.search-wrapper button {
    padding: 7px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 0.85em;
}

.header-actions button {
    margin-left: 6px;
}

/* TOOL CARD */
.tool {
    display: flex;
    gap: 16px;
    background: var(--card);
    margin: 16px auto;
    padding: 16px;
    max-width: 900px;
    border-radius: 12px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

/* effet au survol */
.tool:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}


/* BADGES */
.badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    background: #d6ecff;
    margin-right: 6px;
    cursor: pointer;
}

/* FILTER PANEL */
.filter-panel{
    position: fixed;
    top: 0;
    right: -380px;
    width: 360px;
    height: 100%;
    background: var(--card);
    transition: 0.35s ease;
    display: flex;
    flex-direction: column;
    box-shadow: -8px 0 25px rgba(0,0,0,0.15);
    z-index: 999;
}

.filter-panel.open{
    right: 0;
}

/* FILTER HEADER */
.filter-header{
    display:flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: linear-gradient(135deg, #2c3e50, #2c7be5);
    color: white;
    font-weight: bold;
}

/* FILTER CONTENT */
.filter-content{
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
}

.filter-group label{
    font-size: 0.8em;
    opacity: 0.7;
    display: block;
    margin-bottom: 4px;
}

.filter-panel select{
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid rgba(0,0,0,0.2);
}

/* FILTER FOOTER */
.filter-footer{
    padding: 14px;
    border-top: 1px solid rgba(0,0,0,0.1);
}

.filter-footer button{
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: #e74c3c;
    color: white;
    cursor: pointer;
    font-size: 0.9em;
}

/* CLOSE */
.close-btn{
    cursor: pointer;
    font-size: 18px;
}

/* FOOTER */
footer{
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    padding: 10px;
    background: linear-gradient(135deg, #2c3e50, #2c7be5);
    color: white;
}
</style>
</head>

<body>

<header>
    <div class="logo">🧬 Entomology Tools</div>

    <div class="search-wrapper">
        <input id="searchInput" oninput="applyFilters()" placeholder="Search tools...">
        <button onclick="applyFilters()">Search</button>
        <button onclick="resetAll()">Reset List ✖</button>
    </div>

    <div class="header-actions">
        <button onclick="openFilters()">Filters</button>
        <button onclick="toggleDark()" id="themeBtn">🌙</button>
    </div>
</header>

<main id="toolsContainer"></main>

<!-- FILTER PANEL -->
<div id="filterPanel" class="filter-panel">

    <div class="filter-header">
        <h3>Filters</h3>
        <span class="close-btn" onclick="closeFilters()">✖</span>
    </div>

    <div class="filter-content">

        <div class="filter-group">
            <label>Language</label>
            <select id="filter-lang" onchange="applyFilters()"></select>
        </div>

        <div class="filter-group">
            <label>Platform</label>
            <select id="filter-platform" onchange="applyFilters()"></select>
        </div>

        <div class="filter-group">
            <label>Taxa</label>
            <select id="filter-taxa" onchange="applyFilters()"></select>
        </div>

        <div class="filter-group">
            <label>Category</label>
            <select id="filter-category" onchange="applyFilters()"></select>
        </div>

    </div>

    <div class="filter-footer">
        <button onclick="resetAll()">Reset filters</button>
    </div>

</div>

<footer>
© 2026 - FLX Entomology tools
</footer>

<script>

let toolsData = [];

async function loadData(){
    const res = await fetch("data/tools.json");
    toolsData = await res.json();
    buildFilters(toolsData);
    applyFilters();
}

function openFilters(){
    document.getElementById("filterPanel").classList.add("open");
}

function closeFilters(){
    document.getElementById("filterPanel").classList.remove("open");
}

function toggleDark(){
    document.body.classList.toggle("dark");

    const btn = document.getElementById("themeBtn");

    if(document.body.classList.contains("dark")){
        btn.textContent = "☀️";
    } else {
        btn.textContent = "🌙";
    }
}

/* FILTER BUILDER */
function buildFilters(data){
    ["lang","platform","taxa","category"].forEach(field=>{
        const select = document.getElementById("filter-"+field);
        if (!select) return;

        select.innerHTML = `<option value="">All</option>`;

        const values = new Set();

        data.forEach(t => {
            const v = t[field];

            if (Array.isArray(v)) {
                v.forEach(x => values.add(x));
            } else if (v !== undefined && v !== null) {
                values.add(v);
            }
        });

        [...values].sort().forEach(v=>{
            let opt = document.createElement("option");
            opt.value = v;
            opt.textContent = v;
            select.appendChild(opt);
        });
    });
}

/* RENDER */

function renderTools(data){
    const container = document.getElementById("toolsContainer");
    container.innerHTML = "";

    data.forEach(t=>{
        const div = document.createElement("div");
        div.className = "tool";

        div.innerHTML = `
        
        <img src="${t.image || ''}" alt="${t.title}"
             style="width:120px;max-width:120px;height:auto;object-fit:contain;flex-shrink:0;">

        <div style="flex:1;">
            <h1 style="margin:0 0 6px 0;">${t.title}</h1>

            ${(Array.isArray(t.lang) ? t.lang : [t.lang]).map(l =>
                `<span class="badge" onclick="filterBy('lang','${l}')">${l}</span>`
            ).join("")}

            <span class="badge" onclick="filterBy('platform','${t.platform}')">${t.platform}</span>
            <span class="badge" onclick="filterBy('taxa','${t.taxa}')">${t.taxa}</span>
            <span class="badge" onclick="filterBy('category','${t.category}')">${t.category}</span>

            <p>${t.description}</p>

            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">

                ${t.url ? `
                <a href="${t.url}" target="_blank"
                   style="display:inline-block;padding:7px 12px;border-radius:8px;background:#2c7be5;color:white;text-decoration:none;font-size:0.9em;">
                    Download page
                </a>` : ""}

                ${t.github_repo ? `
                <a href="${t.github_repo}" target="_blank"
                   style="display:inline-block;padding:7px 12px;border-radius:8px;background:#6c757d;color:white;text-decoration:none;font-size:0.9em;">
                    GitHub repository
                </a>` : ""}

            </div>
        </div>

        `;

        container.appendChild(div);
    });
}

function resetAll(){
    document.querySelectorAll("select").forEach(s=>s.value="");
    document.getElementById("searchInput").value="";
    applyFilters();
}

function applyFilters(){

    const lang = document.getElementById("filter-lang").value;
    const platform = document.getElementById("filter-platform").value;
    const taxa = document.getElementById("filter-taxa").value;
    const category = document.getElementById("filter-category").value;
    const search = (document.getElementById("searchInput").value || "").toLowerCase();

    const filtered = toolsData.filter(t => {

        const langValues = Array.isArray(t.lang) ? t.lang : [t.lang];

        const okLang = !lang || langValues.includes(lang);
        const okPlatform = !platform || t.platform === platform;
        const okTaxa = !taxa || t.taxa === taxa;
        const okCategory = !category || t.category === category;

        const okSearch =
            !search ||
            (t.title || "").toLowerCase().includes(search) ||
            (t.description || "").toLowerCase().includes(search);

        return okLang && okPlatform && okTaxa && okCategory && okSearch;
    });

    renderTools(filtered);
}


function filterBy(key, value){

    document.getElementById("filter-" + key).value = value;

    const lang = document.getElementById("filter-lang").value;
    const platform = document.getElementById("filter-platform").value;
    const taxa = document.getElementById("filter-taxa").value;
    const category = document.getElementById("filter-category").value;
    const search = (document.getElementById("searchInput").value || "").toLowerCase();

    const filtered = toolsData.filter(t => {

        const langValues = Array.isArray(t.lang) ? t.lang : [t.lang];

        const okLang = !lang || langValues.includes(lang);
        const okPlatform = !platform || t.platform === platform;
        const okTaxa = !taxa || t.taxa === taxa;
        const okCategory = !category || t.category === category;

        const okSearch =
            !search ||
            (t.title || "").toLowerCase().includes(search) ||
            (t.description || "").toLowerCase().includes(search);

        return okLang && okPlatform && okTaxa && okCategory && okSearch;
    });

    renderTools(toolsData.filter(t => {

    const langValues = Array.isArray(t.lang) ? t.lang : [t.lang];

    const okLang = !document.getElementById("filter-lang").value || langValues.includes(document.getElementById("filter-lang").value);
    const okPlatform = !document.getElementById("filter-platform").value || t.platform === document.getElementById("filter-platform").value;
    const okTaxa = !document.getElementById("filter-taxa").value || t.taxa === document.getElementById("filter-taxa").value;
    const okCategory = !document.getElementById("filter-category").value || t.category === document.getElementById("filter-category").value;

    const search = (document.getElementById("searchInput").value || "").toLowerCase();

    const okSearch =
        !search ||
        (t.title || "").toLowerCase().includes(search) ||
        (t.description || "").toLowerCase().includes(search);

    return okLang && okPlatform && okTaxa && okCategory && okSearch;
}));
}







loadData();

</script>

</body>
</html>
