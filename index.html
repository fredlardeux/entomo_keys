<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Entomology Repository</title>

<style>
:root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #333;
    --accent: #2c7be5;
    --badge: #e1ecff;
}

body.dark {
    --bg: #1e1e1e;
    --card: #2a2a2a;
    --text: #f1f1f1;
    --badge: #3a3a3a;
}

body {
    font-family: Arial;
    margin: 0;
    background: var(--bg);
    color: var(--text);
}

header {
    background: linear-gradient(135deg, #2c3e50, #2c7be5);
    color: white;
    padding: 25px;
    text-align: center;
}

/* ===== CHIPS ===== */
#activeFilters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
}

.chip {
    background: var(--accent);
    color: white;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
}

/* ===== CARDS ===== */
main {
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.tool {
    display: flex;
    gap: 18px;
    align-items: center;
    width: 100%;
    max-width: 900px;
    margin-bottom: 20px;
    padding: 18px;
    border-radius: 14px;
    background: var(--card);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

.tool img {
    width: 90px;
    height: 90px;
    object-fit: contain;
}

.tool > div {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

/* BADGES */
.badge {
    background: var(--badge);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.75em;
    cursor: pointer;
}

.status-ok { background:#d4edda; color:#155724; }
.status-soon { background:#fff3cd; color:#856404; }

/* TAGS */
.tag {
    display: inline-block;
    background: #eef3ff;
    color: #2c7be5;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 0.75em;
    cursor: pointer;
    margin-right: 5px;
}

/* BUTTONS */
.button-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 8px;
}

.btn {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.85em;
}

.download-btn { background: var(--accent); color: white; }
.install-btn { background: #6c757d; color: white; }
.meta-btn { background: #343a40; color: white; }

/* METRICS */
.metrics {
    font-size: 0.8em;
    opacity: 0.8;
}

/* MODAL */
#modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.3);
    display: none;
    z-index: 9999;
}

#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}
</style>
</head>

<body>

<header>
<h1>Scientific Entomology Repository</h1>

<div id="activeFilters"></div>
</header>

<main>

<!-- ================= CARD ================= -->
<div class="tool"
     data-id="moustic_reunion"
     data-version="v1.2"
     data-github="1200"
     data-zenodo="800"
     data-tags="mosquito,vector,réunion">

<img src="images/logo_moustic_reunion.png">

<div>

<h2>Moustic Réunion <small>(v1.2)</small></h2>

<div>
<span class="badge status-ok">Available</span>
<span class="badge">Android</span>
</div>

<p>Entomological dichotomous key for mosquito identification.</p>

<div class="metrics" id="metrics-moustic_reunion"></div>

<div class="button-group">

<button class="btn download-btn" onclick="downloadTool('moustic_reunion')">
⬇ Download
</button>

<button class="btn install-btn" onclick="openModal('moustic_reunion')">
📲 Installation
</button>

<button class="btn meta-btn" onclick="citeAPA('moustic_reunion')">
APA
</button>

<button class="btn meta-btn" onclick="exportBib('moustic_reunion')">
BibTeX
</button>

</div>

<div>
<span class="tag" onclick="filterTag('mosquito')">mosquito</span>
<span class="tag" onclick="filterTag('vector')">vector</span>
<span class="tag" onclick="filterTag('réunion')">réunion</span>
</div>

</div>
</div>

</main>

<div id="modal"></div>
<div id="overlay"></div>

<script>

/* =========================
   INSTALLATION MODAL FIX
========================= */
function openModal(id){
    document.getElementById("modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
    document.getElementById("modal").innerHTML =
        "<h3>Installation</h3><p>Tool: " + id + "</p><button onclick='closeModal()'>Close</button>";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}

document.getElementById("overlay").onclick = closeModal;

/* =========================
   DOWNLOAD TRACKING
========================= */
function downloadTool(id){

let el = document.querySelector('[data-id="'+id+'"]');

let g = parseInt(el.dataset.github);
let z = parseInt(el.dataset.zenodo);

let total = g + z;

alert("Download started. Total citations: " + total);

}

/* =========================
   APA CITATION
========================= */
function citeAPA(id){

let el = document.querySelector('[data-id="'+id+'"]');

let text =
"Moustic Réunion (2025). Entomological Tool. GitHub + Zenodo repository.";

navigator.clipboard.writeText(text);

alert("APA citation copied");
}

/* =========================
   BIBTEX EXPORT
========================= */
function exportBib(id){

let bib =
`@software{moustic_reunion,
  title={Moustic Réunion},
  year={2025},
  url={https://github.com/fredlardeux/entomo_tools},
  note={GitHub + Zenodo combined repository}
}`;

let blob = new Blob([bib], {type:"text/plain"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = id + ".bib";
a.click();
}

/* =========================
   TAG FILTER (simple demo)
========================= */
function filterTag(tag){
    alert("Filter activated: " + tag);
}

</script>

</body>
</html>
